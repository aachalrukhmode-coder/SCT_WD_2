<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeoCalc - Web Calculator</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", Tahoma, sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top left, #1a2a6c, #b21f1f, #fdbb2d);
}

.calculator {
  width: 350px;
  background: #202020;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.6);
}

.display {
  width: 100%;
  height: 70px;
  background: #2b2b2b;
  color: #00e6e6;
  font-size: 2rem;
  border: none;
  outline: none;
  text-align: right;
  padding: 15px;
  border-radius: 8px;
  margin-bottom: 18px;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

button {
  height: 60px;
  border: none;
  border-radius: 8px;
  font-size: 1.2rem;
  cursor: pointer;
  transition: 0.2s ease;
}

button:hover {
  background: #444;
  transform: scale(1.07);
}

.num {
  background: #3d3d3d;
  color: #fff;
}

.op {
  background: #f39c12;
  color: #fff;
}

.equal {
  background: #27ae60;
  color: #fff;
  grid-column: span 2;
}

.clear {
  background: #c0392b;
  color: #fff;
}

.del {
  background: #2980b9;
  color: #fff;
}
</style>
</head>

<body>
<div class="calculator">
  <input type="text" class="display" id="screen" readonly>

  <div class="buttons">
    <button class="clear">AC</button>
    <button class="del">⌫</button>
    <button class="op">%</button>
    <button class="op">/</button>

    <button class="num">7</button>
    <button class="num">8</button>
    <button class="num">9</button>
    <button class="op">*</button>

    <button class="num">4</button>
    <button class="num">5</button>
    <button class="num">6</button>
    <button class="op">-</button>

    <button class="num">1</button>
    <button class="num">2</button>
    <button class="num">3</button>
    <button class="op">+</button>

    <button class="num">0</button>
    <button class="num">.</button>
    <button class="equal">=</button>
  </div>
</div>

<script>
const screen = document.getElementById("screen");
const nums = document.querySelectorAll(".num");
const ops = document.querySelectorAll(".op");
const clearBtn = document.querySelector(".clear");
const delBtn = document.querySelector(".del");
const equalBtn = document.querySelector(".equal");

// Append numbers
nums.forEach(btn => {
  btn.addEventListener("click", () => {
    screen.value += btn.innerText;
  });
});

// Append operators
ops.forEach(btn => {
  btn.addEventListener("click", () => {
    screen.value += btn.innerText;
  });
});

// Clear screen
clearBtn.addEventListener("click", () => {
  screen.value = "";
});

// Delete last char
delBtn.addEventListener("click", () => {
  screen.value = screen.value.slice(0, -1);
});

// Calculate
equalBtn.addEventListener("click", () => {
  try {
    if (screen.value.trim() === "") return;
    let expr = screen.value.replace(/%/g, "/100");
    let result = eval(expr);
    screen.value = isFinite(result) ? result : "Error";
  } catch {
    screen.value = "Error";
  }
});

// Keyboard support
document.addEventListener("keydown", e => {
  const k = e.key;
  if ((k >= "0" && k <= "9") || ["+", "-", "*", "/", ".", "%"].includes(k)) {
    screen.value += k;
  } else if (k === "Enter") {
    e.preventDefault();
    try {
      let expr = screen.value.replace(/%/g, "/100");
      let result = eval(expr);
      screen.value = isFinite(result) ? result : "Error";
    } catch {
      screen.value = "Error";
    }
  } else if (k === "Backspace") {
    screen.value = screen.value.slice(0, -1);
  } else if (k === "Escape") {
    screen.value = "";
  }
});
</script>
</body>
</html>
